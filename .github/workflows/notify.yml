name: Notify on Push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ github.event.commits }}

    steps:
      - name: Send message to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          COMMIT_MESSAGE: ${{ matrix.message }}
          COMMIT_SHA: ${{ matrix.id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ matrix.id }}
          PUSHER: ${{ github.event.pusher.name }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          escape_markdown() {
            printf '%s' "$1" | sed -e 's/[][\\_*()~`>#+=|{}.!-]/\\&/g'
          }

          escape_markdown_url() {
            printf '%s' "$1" | sed -e 's/[\\)]/\\&/g'
          }

          file_diff_url() {
            local path="$1"
            local anchor

            # GitHub commit file anchors are sha256(path).
            anchor="$(printf '%s' "$path" | sha256sum | cut -d ' ' -f 1)"
            printf '%s#diff-%s' "$COMMIT_URL" "$anchor"
          }

          append_file_links() {
            local label="$1"
            local files_json="$2"
            local links=""
            local path file_url escaped_path escaped_file_url

            while IFS= read -r path; do
              [ -n "$path" ] || continue

              file_url="$(file_diff_url "$path")"
              escaped_path="$(escape_markdown "$path")"
              escaped_file_url="$(escape_markdown_url "$file_url")"
              links+=$'\n'"\\- [$escaped_path]($escaped_file_url)"
            done < <(printf '%s' "$files_json" | jq -r '.[]?')

            [ -z "$links" ] || FILE_LINKS+=$'\n\n'"*$label:*$links"
          }

          commit_files_by_status() {
            local file_status="$1"

            printf '%s' "$COMMIT_DATA" | jq -c --arg status "$file_status" '[.files[]? | select(.status == $status) | .filename]'
          }

          SHORT_SHA="${COMMIT_SHA:0:7}"
          ESCAPED_SHORT_SHA="$(escape_markdown "$SHORT_SHA")"
          ESCAPED_URL="$(escape_markdown_url "$COMMIT_URL")"
          ESCAPED_PUSHER="$(escape_markdown "$PUSHER")"
          ESCAPED_MESSAGE="$(escape_markdown "$COMMIT_MESSAGE" | sed 's/^/> /')"
          COMMIT_DATA="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL/repos/$REPOSITORY/commits/$COMMIT_SHA")"
          FILE_LINKS=""
          append_file_links "Added" "$(commit_files_by_status "added")"
          append_file_links "Modified" "$(commit_files_by_status "modified")"
          append_file_links "Removed" "$(commit_files_by_status "removed")"
          append_file_links "Renamed" "$(commit_files_by_status "renamed")"

          FILE_SECTION=""
          [ -z "$FILE_LINKS" ] || FILE_SECTION="$FILE_LINKS"

          printf -v TEXT '%s\n\n*Commit:* [%s](%s)\n*Pushed by:* %s%s' \
            "$ESCAPED_MESSAGE" \
            "$ESCAPED_SHORT_SHA" \
            "$ESCAPED_URL" \
            "$ESCAPED_PUSHER" \
            "$FILE_SECTION"

          curl -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHANNEL_ID" \
            --data-urlencode "text=$TEXT" \
            -d "parse_mode=MarkdownV2" \
            -d "disable_notification=true"
